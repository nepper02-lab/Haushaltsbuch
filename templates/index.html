<!DOCTYPE html>
<html>
<head>
    <title>Haushaltsbuch</title>
</head>
<body>

<h1>Willkommen {{ username }}</h1>

<p>Monat: {{ month }}</p>

<h3>Einträge</h3>

<ul>
{% for e in entries %}
    <li>{{ e.desc }} - {{ e.amount }} €</li>
{% endfor %}
</ul>

<form method="POST">
    <input name="month" placeholder="YYYY-MM" required>
    <input name="desc" placeholder="Beschreibung" required>
    <input name="category" placeholder="Kategorie" required>
    <input name="amount" type="number" step="0.01" required>
    <select name="payer">
        <option value="A">A</option>
        <option value="B">B</option>
    </select>
    <select name="kind">
        <option value="shared">shared</option>
        <option value="private">private</option>
    </select>

    <button name="action" value="add_entry">Hinzufügen</button>
</form>

</body>
</html>
